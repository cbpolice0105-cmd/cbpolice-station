<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>피싱-안전소식</title>

    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CPSKM0VVYP"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());    
        gtag('config', 'G-CPSKM0VVYP', { 'page_title': '피싱-안전소식' });
    </script>
    
   
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; touch-action: manipulation; }
        .bg-police-dark { background-color: #1a237e; }
        .text-police-blue { color: #1a237e; }
        
       
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        
        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; animation-fill-mode: both; }
        @keyframes fadeInUp { 
            0% { opacity: 0; transform: translateY(20px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }
        
        
        .news-card { transition: transform 0.2s, box-shadow 0.2s; }
        .news-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-100">

<div id="app" class="max-w-md mx-auto w-full min-h-screen bg-gray-50 shadow-lg relative overflow-x-hidden flex flex-col text-gray-800">
        
    
    <header class="bg-police-dark text-white shadow-md z-20 sticky top-0" style="padding: 1rem; padding-top: max(1rem, env(safe-area-inset-top));">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-2.5">
            <button onclick="location.href='../'" class="p-1 -ml-1 rounded-full hover:bg-blue-900 transition flex-shrink-0">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </button>
            <img src="logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Emblem_of_the_Korean_National_Police_Agency.svg/150px-Emblem_of_the_Korean_National_Police_Agency.svg.png'" class="w-10 h-10 object-contain rounded-full bg-white p-0.5 shadow-sm flex-shrink-0">
            <div class="flex flex-col justify-center">
                <h1 class="font-black text-lg leading-tight tracking-tight">피싱-안전소식</h1>
                <p class="text-[10px] text-gray-300 font-medium">충청북도경찰청 범죄예방대응과</p>
            </div>
        </div>
        <div>
            <button onclick="openInstallGuide()" class="text-white bg-white/20 hover:bg-white/30 text-xs rounded-lg px-3 py-1.5 font-bold transition flex items-center gap-1.5 shadow-inner">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>바로가기
            </button>
        </div>
    </div>
</header>

        <div class="bg-white border-b border-gray-200 p-5 text-center shadow-sm z-10 relative overflow-hidden">
            <div class="absolute -right-4 -top-4 opacity-5">
                <i class="fa-solid fa-shield-halved text-9xl text-police-blue"></i>
            </div>
            <p class="text-xs font-bold text-gray-500 mb-1 tracking-wider uppercase" id="currentDateDisplay"></p>
            <h2 class="text-xl font-black text-police-blue leading-snug">
                피싱범죄로부터<br>안전한 지역사회
            </h2>
            <p class="text-xs text-gray-500 mt-2">최신 피싱범죄예방 소식을 확인하세요.</p>
        </div>

        <main class="flex-1 overflow-y-auto p-4 pb-12 no-scrollbar">
            <div id="newsFeed" class="space-y-4">
                
            </div>
            
            <div class="mt-8 text-center opacity-50">
                <i class="fa-solid fa-check-circle text-gray-400 text-3xl mb-2"></i>
                <p class="text-xs font-bold text-gray-500">모든 소식을 확인하셨습니다.</p>
            </div>
        </main>

        <footer class="bg-white p-5 text-center border-t border-gray-200 text-[10px] text-gray-400 font-medium pb-8">
            <p class="mb-1 text-gray-500 font-bold">충청북도경찰청 범죄예방대응과</p>
            범죄신고 112 | 민원상담 182 | 피싱신고·상담 1394<br>
            ⓒ 2026 Sangdang Police Station. All rights reserved.
        </footer>

        <div id="guideModal" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center p-6 text-center text-gray-800">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 relative">
                <button onclick="closeGuide()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
                
                <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-3 text-police-blue text-2xl">
                    <i class="fa-solid fa-mobile-screen-button"></i>
                </div>
                
                <h2 class="text-xl font-black mb-1 text-police-dark">바탕화면에 설치하기</h2>
                <p class="text-xs text-gray-500 mb-5 tracking-tight font-medium">아이콘을 만들어 두면 언제든 빠르게 접속할 수 있습니다.</p>
                
                <div class="flex border-b mb-4">
                    <button onclick="switchGuide('android')" id="guideTabAndroid" class="flex-1 py-2.5 text-sm font-bold border-b-2 border-police-dark text-police-dark transition-colors">안드로이드</button>
                    <button onclick="switchGuide('ios')" id="guideTabIos" class="flex-1 py-2.5 text-sm font-bold border-b-2 border-transparent text-gray-400 transition-colors">아이폰</button>
                </div>
                
                <div id="guideContent" class="bg-gray-50 p-5 rounded-2xl text-[13px] text-left space-y-4 min-h-[160px] leading-relaxed border border-gray-100">
                    
                </div>
                
                <button onclick="closeGuide()" class="w-full bg-police-dark hover:bg-blue-900 text-white py-4 rounded-xl mt-5 font-black shadow-lg active:scale-95 transition text-base">확인했습니다</button>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // [작성 구역] 피싱 소식지 데이터
        // ==========================================
        // type: '긴급'(빨간색), '알림'(파란색), '정책'(초록색)
        const NEWS_LETTERS = [           
            {
                type: '알림',
                title: '자영업자 타겟 신종 노쇼(No-show) 사기',
                date: '2026.06.05',
                desc: '공공기관 및 군부대를 사칭하여 단체 예약을 한 뒤, "특정 업체의 와인/식자재 대납"을 유도하는 신종 사기가 발생하고 있습니다.<br><br>어떠한 핑계라도 <b>"선결제, 대납 요구"</b>를 한다면 100% 사기이므로 즉시 112로 신고 바랍니다.'
            },
            {
                type: '정책',
                title: '보이스피싱 예방수칙 "어서끊자!" 캠페인',
                date: '2026.06.05',
                desc: '최근 다양한 시나리오의 보이스피싱 범죄가 증가함에 따라 피싱 범죄를 예방하기 위해 <b>"어서끊자!"</b> 캠페인을 추진하고 있습니다.<br><br>최고의 피싱범죄 예방은 <b>"전화를 끊는 것"</b> 부터 시작이라는 점 기억하세요.'
            },
            {
                type: '알림',
                title: '보이스피싱 예방 훈련소 "피싱-백신" 운영',
                date: '2026.06.05',
                desc: '범인의 실제 목소리를 듣고 가상으로 대처해볼 수 있는 <b>보이스피싱 예방 훈련소(피싱-백신)</b>가 정식 오픈했습니다.<br>신종 수법을 미리 체험하고 피해를 예방하세요.'
            }
        ];

        function initApp() {
            
            const now = new Date();
            document.getElementById('currentDateDisplay').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            
            
            renderNewsletters();
        }

        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

        function renderNewsletters() {
            const feed = document.getElementById('newsFeed');
            let contentHTML = ''; 
            
            NEWS_LETTERS.forEach((news, index) => {
                
                let badgeColor = '';
                let iconHtml = '';
                
                if (news.type === '긴급') {
                    badgeColor = 'bg-red-100 text-red-600 border-red-200';
                    iconHtml = '<i class="fa-solid fa-triangle-exclamation text-red-500 animate-pulse"></i>';
                } else if (news.type === '정책') {
                    badgeColor = 'bg-green-100 text-green-700 border-green-200';
                    iconHtml = '<i class="fa-solid fa-landmark text-green-600"></i>';
                } else {
                    badgeColor = 'bg-blue-100 text-blue-600 border-blue-200';
                    iconHtml = '<i class="fa-solid fa-bell text-blue-500"></i>';
                }

               
                const delay = index * 0.1;

                const cardHTML = `
                    <article class="news-card bg-white rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100 overflow-hidden fade-in-up" style="animation-delay: ${delay}s">
                        <div class="p-5">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[11px] font-black px-2.5 py-1 rounded-md border ${badgeColor} flex items-center gap-1.5 tracking-tight">
                                    ${iconHtml} ${news.type}
                                </span>
                                <span class="text-[11px] text-gray-400 font-bold"><i class="fa-regular fa-calendar mr-1"></i>${news.date}</span>
                            </div>
                            <h3 class="font-black text-gray-800 text-[17px] mb-2.5 leading-snug break-keep">
                                ${news.title}
                            </h3>
                            <div class="text-[13.5px] text-gray-600 leading-relaxed font-medium break-keep bg-gray-50 p-4 rounded-xl border border-gray-100">
                                ${news.desc}
                            </div>
                        </div>
                    </article>
                `;
                contentHTML += cardHTML;
            });            
          
            feed.innerHTML = contentHTML; 
        }

        function openInstallGuide() {
            const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
            switchGuide(isIOS ? 'ios' : 'android');
            document.getElementById('guideModal').style.display = 'flex';
        }
        
        function closeGuide() { 
            document.getElementById('guideModal').style.display = 'none'; 
        }
        
        function switchGuide(os) {
            const btnAnd = document.getElementById('guideTabAndroid');
            const btnIos = document.getElementById('guideTabIos');
            const content = document.getElementById('guideContent');
            
            const activeClass = "flex-1 py-2.5 text-sm font-black border-b-2 border-police-dark text-police-dark transition-colors";
            const inactiveClass = "flex-1 py-2.5 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors";
            
            if (os === 'android') {
                btnAnd.className = activeClass;
                btnIos.className = inactiveClass;
                content.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center shrink-0 mt-0.5">1</div>
                        <div>현재 창 우측 상단(또는 하단)의 <b class="text-gray-800"><i class="fa-solid fa-ellipsis-vertical mx-1"></i>점 3개 메뉴</b>를 클릭합니다.</div>
                    </div>
                    <div class="flex items-start gap-3 mt-3">
                        <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center shrink-0 mt-0.5">2</div>
                        <div><b class="text-gray-800"><i class="fa-solid fa-mobile-screen mx-1"></i>홈 화면에 추가</b> 항목을 찾아 선택합니다.</div>
                    </div>`;
            } else {
                btnIos.className = activeClass;
                btnAnd.className = inactiveClass;
                content.innerHTML = `
                    <div class="text-[11px] text-blue-600 bg-blue-50 p-2 rounded-lg border border-blue-100 font-bold mb-3 flex items-center gap-1.5">
                        <i class="fa-brands fa-safari"></i> 아이폰은 Safari 브라우저에서만 가능합니다.
                    </div>
                    <div class="flex items-start gap-3">
                        <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center shrink-0 mt-0.5">1</div>
                        <div>브라우저 하단 중앙의 <b class="text-blue-600"><i class="fa-solid fa-arrow-up-from-bracket mx-1"></i>공유</b> 버튼을 클릭합니다.</div>
                    </div>
                    <div class="flex items-start gap-3 mt-3">
                        <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 font-black flex items-center justify-center shrink-0 mt-0.5">2</div>
                        <div>메뉴를 위로 올려 <b class="text-gray-800"><i class="fa-regular fa-square-plus mx-1"></i>홈 화면에 추가</b>를 선택합니다.</div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
